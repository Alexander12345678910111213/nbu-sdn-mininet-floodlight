services:
  floodlight:
    build:
      context: ./floodlight
    container_name: floodlight
    ports:
      - "8080:8080"
      - "6653:6653"
      - "6633:6633"
    networks:
      - sdn-net

  mininet:
    build:
      context: ./mininet
    container_name: mininet
    privileged: true
    tty: true
    stdin_open: true
    volumes:
      - ./scripts:/scripts
    depends_on:
      - floodlight
    networks:
      - sdn-net
    command: bash -c "service openvswitch-switch start || true; tail -f /dev/null"

networks:
  sdn-net:
    driver: bridge
